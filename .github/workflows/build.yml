name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "**/*.py"
      - "assets/**"
      - "extensions/**"
      - "pyproject.toml"
      - "requirements.txt"

permissions:
  contents: read

jobs:
  build-apk:
    name: Test and build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PYTHONUTF8: "1"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Validates that all required GitHub Secrets are configured before proceeding with the build.
      # This prevents build failures due to missing API keys or configuration values.
      # Required secrets: GROQ_API_KEY, GEMINI_API_KEY, ELEVENLABS_API_KEY, FIREBASE_API_KEY, 
      # FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID, FIREBASE_APP_ID, GOOGLE_OAUTH_CLIENT_ID, 
      # GOOGLE_OAUTH_CLIENT_SECRET
      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            GROQ_API_KEY GEMINI_API_KEY ELEVENLABS_API_KEY
            FIREBASE_API_KEY FIREBASE_AUTH_DOMAIN FIREBASE_PROJECT_ID
            FIREBASE_APP_ID GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing GitHub Secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required GitHub Secrets are configured."

      # Installs all Python dependencies required for the project.
      # Uses pip check to verify that all dependencies are compatible with each other.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      # Verify private configuration loads - Creates a .env configuration file with all sensitive API keys and Firebase settings.
      # This file is used at runtime by the application to access external services.
      # The configuration includes Gemini model selection and OAuth redirect URL setup.
      - name: Create private build configuration
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          names = (
              "GROQ_API_KEY",
              "GEMINI_API_KEY",
              "ELEVENLABS_API_KEY",
              "FIREBASE_API_KEY",
              "FIREBASE_AUTH_DOMAIN",
              "FIREBASE_PROJECT_ID",
              "FIREBASE_APP_ID",
              "GOOGLE_OAUTH_CLIENT_ID",
          )
          values = {name: os.environ[name].strip() for name in names}
          values.update(
              {
                  "GEMINI_MODEL": "gemini-2.5-flash",
                  "GOOGLE_OAUTH_REDIRECT_URL": "http://localhost:8550/oauth_callback",
                  "PRIVACY_POLICY_URL": "",
                  "APP_SHARE_URL": "",
                  "SUPPORT_EMAIL": "",
                  "WHATSAPP_NUMBER": "",
                  "APP_ENV": "development",
                  "DEV_PREMIUM_MODE": "false",
                  "ADMOB_TEST_MODE": "true",
              }
          )
          for name, value in values.items():
              if "\n" in value or "\r" in value:
                  raise SystemExit(f"{name} contains a line break.")
          content = "\n".join(
              f"{name}={json.dumps(value)}" for name, value in values.items()
          )
          Path(".env").write_text(content + "\n", encoding="utf-8")
          print("Private configuration created without printing secret values.")
          PY

      # Runs all automated unit tests to verify code quality and functionality.
      # Compiles Python files for syntax checking and discovers/runs all tests in the tests directory.
      # This ensures the build only proceeds if all tests pass.
      - name: Run automated tests
        run: |
          python -m compileall -q main.py config.py services tests
          python -m unittest discover -s tests -v

      # Clean up private configuration after tests
      - name: Clean up configuration
        if: always()
        shell: python
        run: |
          from pathlib import Path
          Path(".env").unlink(missing_ok=True)

      # Builds the Android APK using Flet framework.
      # --clear-cache: Clears the Flet build cache to ensure clean builds and prevent stale artifacts.
      # --yes: Automatically accepts default options during the build process (no interactive prompts).
      # --no-rich-output: Disables rich formatting for logs, providing plain text output suitable for CI/CD logs.
      # This command must match the test expectations in test_extended_services.py
      - name: Build Android APK
        run: flet build apk --clear-cache --yes --no-rich-output

      # Locates the generated APK file from the build directory and copies it to the release folder.
      # Verifies that an APK was actually produced; fails the build if no APK is found.
      # Renames the APK to 'AI_Master_Pro.apk' for consistent artifact naming.
      - name: Collect APK
        shell: bash
        run: |
          apk_path="$(find build -type f -name '*.apk' -print | sort | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK was produced."
            exit 1
          fi
          mkdir -p release
          cp "$apk_path" release/AI_Master_Pro.apk

      # Uploads the built APK as a GitHub Actions artifact for easy download and distribution.
      # Artifact name includes the run number for version tracking.
      # Retention period set to 14 days to manage storage costs while keeping recent builds available.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Master-Pro-APK-${{ github.run_number }}
          path: release/AI_Master_Pro.apk
          if-no-files-found: error
          retention-days: 14
